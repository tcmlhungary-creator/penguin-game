<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%);
            overflow-x: hidden;
        }
        .pixel-font {
            font-family: 'ZCOOL KuaiLe', 'Noto Sans TC', sans-serif;
        }
        /* 企鵝動畫 */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .penguin-float {
            animation: float 3s ease-in-out infinite;
        }
        .penguin-shake {
            animation: shake 0.4s ease-in-out infinite;
        }
        .penguin-bounce {
            animation: bounce-slow 1s ease-in-out infinite;
        }
        /* 飄字特效 */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
        }
        .floating-text {
            animation: floatUp 1.2s forwards ease-out;
        }
        /* 雪花/Kiss雨特效 */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 50;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        /* 對話框尖角 */
        .bubble-tail::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 12px 12px 0;
            border-style: solid;
            border-color: white transparent;
            display: block;
            width: 0;
        }
    </style>
</head>

    <script>
        // --- 1. 音效生成器 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'correct') {
                // 輕快叮咚聲
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                // 答錯嗶嗶聲
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.25);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'badluck') {
                // 警報/震撼效果音
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.setValueAtTime(600, now + 0.08);
                osc.frequency.setValueAtTime(300, now + 0.16);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            } else if (type === 'win') {
                // 勝利琶音
                const freqs = [261.63, 329.63, 392.00, 523.25, 659.25, 1046.50];
                freqs.forEach((f, i) => {
                    const oscSeq = audioCtx.createOscillator();
                    const gainSeq = audioCtx.createGain();
                    oscSeq.connect(gainSeq);
                    gainSeq.connect(audioCtx.destination);
                    
                    oscSeq.frequency.setValueAtTime(f, now + (i * 0.08));
                    gainSeq.gain.setValueAtTime(0.1, now + (i * 0.08));
                    gainSeq.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.08) + 0.3);
                    
                    oscSeq.start(now + (i * 0.08));
                    oscSeq.stop(now + (i * 0.08) + 0.3);
                });
            } else if (type === 'lose') {
                // 失敗哀傷聲
                osc.type = 'sine';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(110, now + 0.6);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            }
        }

        // --- 2. 遊戲狀態變數 ---
        let mood = 50;

        let isQuizMode = false;
        
        let decayInterval = null;
        let demandTimeout = null;

            { q: "蘋果是什麼顏色？", a: "A. 紅色", b: "B. 藍色", c: "C. 黑色", ans: "A" },

            { q: "我們用身體的什麼部位看書？", a: "A. 眼睛", b: "B. 鼻子", c: "C. 耳朵", ans: "A" },

        // --- 3. DOM 節點獲取 ---
        const moodBar = document.getElementById('mood-bar');

        const endEmoji = document.getElementById('end-emoji');

        const effectContainer = document.getElementById('effect-container');
        const bgSnowContainer = document.getElementById('bg-snow-container');

        // --- 4. 核心遊戲流程 ---

        // 初始化
        window.onload = () => {
            createSnowBg();
            resetGame();
        };

        // 背景飄雪花特效
        function createSnowBg() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    spawnSnow();
                }, i * 300);
            }
            setInterval(spawnSnow, 1500);
        }

        function spawnSnow() {
            if (isGameOver) return;
            const snow = document.createElement('div');
            snow.className = 'particle text-white/40 text-lg select-none';
            snow.innerHTML = '❄';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.fontSize = (Math.random() * 12 + 10) + 'px';
            snow.style.animationDuration = (Math.random() * 5 + 5) + 's';
            bgSnowContainer.appendChild(snow);
            setTimeout(() => {
                snow.remove();
            }, 10000);
        }

        // 重置/開始遊戲
        function resetGame() {
            mood = 50;
            isGameOver = false;
            isQuizMode = false;
            currentDemand = null;
            
            // 關閉 Modal
            closeModal(quizModal, quizCard);
            closeModal(endModal, endCard);
            
            // 重置企鵝狀態
            setPenguinExpression('normal');
            speechBubble.innerText = "哈囉！我現在心情很好，來陪我玩吧！";
            speechBubbleContainer.className = "relative w-full max-w-xs mb-8 transform scale-100";
            
            updateMoodUI();
            
            // 清理並重新啟動計時器
            clearInterval(decayInterval);
            clearTimeout(demandTimeout);
            
            startDecay();
            scheduleNextDemand(1500); // 1.5 秒後提出第一個需求
        }

        // 心情每秒扣 2 分
        function startDecay() {
            decayInterval = setInterval(() => {
                if (isGameOver || isQuizMode) return;
                
                changeMood(-2);
            }, 1000);
        }

        // 更改心情分數並更新 UI
        function changeMood(amount) {
            mood += amount;
            if (mood > 100) mood = 100;
            if (mood < 0) mood = 0;

            updateMoodUI();
            
            // 數值增減特效
            if (amount !== -2 && amount !== 0) { // 忽略每秒自動扣除的特效顯示
                spawnFloatingText(amount > 0 ? `+${amount} 心情` : `${amount} 心情`, amount > 0 ? 'text-emerald-500' : 'text-red-500');
            }

            // 判斷勝負條件
            if (mood >= 100) {
                winGame();
            } else if (mood <= 0) {
                loseGame();
            }
        }

        // 更新 UI 及企鵝動態表情
        function updateMoodUI() {
            moodBar.style.width = mood + '%';
            moodScoreText.innerText = `${mood} / 100`;

            // 調整血條漸層與警告效果
            if (mood > 60) {
                moodBar.className = "h-full bg-gradient-to-r from-emerald-400 to-teal-500 transition-all duration-300 ease-out";
                criticalAlert.style.opacity = 0;
                moodIcon.innerText = "😀";
                moodStatusText.innerText = "企鵝心情棒極了！";
                if (!isQuizMode && !isGameOver) setPenguinExpression('happy');
            } else if (mood > 30) {
                moodBar.className = "h-full bg-gradient-to-r from-amber-400 to-orange-400 transition-all duration-300 ease-out";
                criticalAlert.style.opacity = 0;
                moodIcon.innerText = "😐";
                moodStatusText.innerText = "企鵝心情普通";
                if (!isQuizMode && !isGameOver) setPenguinExpression('normal');
            } else {
                moodBar.className = "h-full bg-gradient-to-r from-red-500 to-rose-600 transition-all duration-300 ease-out";
                criticalAlert.style.opacity = 1;
                moodIcon.innerText = "😢";
                moodStatusText.innerText = "企鵝快要哭了！";
                if (!isQuizMode && !isGameOver) setPenguinExpression('sad');
            }
        }

        // 控制企鵝的 SVG 表情
        function setPenguinExpression(state) {
            // 先隱藏所有表情
            eyesNormal.classList.add('hidden');
            eyesSad.classList.add('hidden');
            eyesAngry.classList.add('hidden');
            eyesHappy.classList.add('hidden');
            beakNormal.classList.add('hidden');
            beakCrying.classList.add('hidden');
            beakHappy.classList.add('hidden');
            
            // 重置動畫類別
            penguinSvg.className = "w-full h-full transition-all duration-300";
            wingL.style.transform = "rotate(0deg)";
            wingR.style.transform = "rotate(0deg)";

            if (state === 'normal') {
                eyesNormal.classList.remove('hidden');
                beakNormal.classList.remove('hidden');
                penguinSvg.classList.add('penguin-float');
            } else if (state === 'sad') {
                eyesSad.classList.remove('hidden');
                beakCrying.classList.remove('hidden');
                penguinSvg.classList.add('penguin-shake');
                wingL.style.transform = "rotate(20deg)";
                wingR.style.transform = "rotate(-20deg)";
            } else if (state === 'angry') {
                eyesAngry.classList.remove('hidden');
                beakNormal.classList.remove('hidden');
                penguinSvg.classList.add('penguin-shake');
                wingL.style.transform = "rotate(-35deg)";
                wingR.style.transform = "rotate(35deg)";
            } else if (state === 'happy') {
                eyesHappy.classList.remove('hidden');
                beakHappy.classList.remove('hidden');
                penguinSvg.classList.add('penguin-bounce');
                wingL.style.transform = "rotate(-50deg)";
                wingR.style.transform = "rotate(50deg)";
            } else if (state === 'kiss') {
                eyesHappy.classList.remove('hidden');
                beakHappy.classList.remove('hidden');
                penguinSvg.classList.add('penguin-bounce');
                wingL.style.transform = "rotate(-60deg)";
                wingR.style.transform = "rotate(60deg)";
            }
        }

        // 浮動文字特效
        function spawnFloatingText(text, colorClass) {
            const el = document.createElement('div');
            el.className = `absolute font-black text-2xl tracking-wide drop-shadow-md floating-text ${colorClass}`;
            el.innerText = text;
            effectContainer.appendChild(el);
            setTimeout(() => {
                el.remove();
            }, 1200);
        }

        // 排程下一個隨機需求（3~5 秒）
        function scheduleNextDemand(customDelay) {
            if (isGameOver || isQuizMode) return;

            const delay = customDelay || (Math.random() * 2000 + 3000); // 3000ms - 5000ms
            
            demandTimeout = setTimeout(() => {
                triggerDemand();
            }, delay);
        }

        // 觸發企鵝提出需求
        function triggerDemand() {
            if (isGameOver || isQuizMode) return;

            // 隨機抽選需求，並確保不與上一次重複
            let nextDemand;
            do {
                nextDemand = demandList[Math.floor(Math.random() * demandList.length)];
            } while (currentDemand && nextDemand.id === currentDemand.id);

            currentDemand = nextDemand;
            
            // 氣泡彈出動畫
            speechBubbleContainer.classList.remove('scale-100');
            speechBubbleContainer.classList.add('scale-0');
            
            setTimeout(() => {
                speechBubble.innerText = currentDemand.text;
                speechBubbleContainer.classList.remove('scale-0');
                speechBubbleContainer.classList.add('scale-100');
                // 對話框微幅彈跳
                speechBubbleContainer.classList.add('animate-bounce');
                setTimeout(() => speechBubbleContainer.classList.remove('animate-bounce'), 800);
            }, 200);

            // 企鵝回到普通神情等待回答
            setPenguinExpression('normal');

            // 再次排程
            scheduleNextDemand();
        }

        // --- 5. 按鈕判定與隨機機制 ---

        function handleOptionClick(btnIndex) {
            if (isGameOver || isQuizMode) return;

            // 如果企鵝目前沒有需求
            if (!currentDemand) {
                speechBubble.innerText = "我現在沒什麼需要的呀！先等等喔。";
                return;
            }

            if (btnIndex === currentDemand.answerIndex) {
                // 答對了！
                // 30% 機率觸發壞運氣
                if (Math.random() < 0.3) {
                    triggerBadLuck();
                } else {
                    playSound('correct');
                    changeMood(15);
                    speechBubble.innerText = "哇！找到了！謝謝你！❤️";
                    setPenguinExpression('happy');
                    currentDemand = null; // 清除目前需求
                }
            } else {
                // 答錯了！
                playSound('wrong');
                changeMood(-10);
                speechBubble.innerText = "不對！請認真點！😤";
                setPenguinExpression('angry');
                
                // 企鵝不悅動畫抖動
                penguinSvg.classList.add('penguin-shake');
                setTimeout(() => {
                    if (!isQuizMode && !isGameOver) {
                        penguinSvg.classList.remove('penguin-shake');
                        setPenguinExpression('normal');
                    }
                }, 1000);
            }
        }

        // --- 6. 壞運氣與隨堂測驗機制 ---

        function triggerBadLuck() {
            isQuizMode = true;
            playSound('badluck');
            
            // 停止需求倒數
            clearTimeout(demandTimeout);
            
            // 企鵝生氣
            setPenguinExpression('angry');
            
            // 隨機選一個壞運氣文字
            const text = badLuckTexts[Math.floor(Math.random() * badLuckTexts.length)];
            badLuckBanner.innerText = `壞運氣！${text}`;

            // 生成中文挑戰題
            currentQuiz = quizBank[Math.floor(Math.random() * quizBank.length)];
            quizQuestion.innerText = currentQuiz.q;

            // 渲染選項
            quizOptionsContainer.innerHTML = '';
            
            const options = [
                { key: 'A', text: currentQuiz.a },
                { key: 'B', text: currentQuiz.b },
                { key: 'C', text: currentQuiz.c }
            ];

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-slate-50 hover:bg-amber-50 active:scale-98 text-slate-800 font-bold py-3.5 px-5 rounded-2xl border-2 border-slate-200 hover:border-amber-400 transition-all flex items-center justify-between";
                btn.innerHTML = `
                    <span>${opt.text}</span>
                    <span class="text-xs bg-slate-200 text-slate-600 px-2.5 py-1 rounded-md font-black">${opt.key}</span>
                `;
                btn.onclick = () => submitQuizAnswer(opt.key);
                quizOptionsContainer.appendChild(btn);
            });

            // 隱藏反饋
            quizFeedback.style.opacity = 0;

            // 開啟彈出視窗
            openModal(quizModal, quizCard);
        }

        function submitQuizAnswer(answerKey) {
            if (answerKey === currentQuiz.ans) {
                // 答對了！
                playSound('correct');
                isQuizMode = false;
                
                // 關閉 Modal
                closeModal(quizModal, quizCard);
                
                // 提示企鵝心情變好
                speechBubble.innerText = "答對了！太厲害了，我的心情變好啦！🥳";
                changeMood(15); // 正確答對補血
                setPenguinExpression('happy');
                
                currentDemand = null; // 清除先前的物品需求
                
                // 重啟遊戲進程
                scheduleNextDemand(3000);
            } else {
                // 答錯了！
                playSound('wrong');
                changeMood(-10); // 答錯立刻扣10分
                
                // 閃動並顯示紅色反饋
                quizFeedback.style.opacity = 1;
                quizFeedback.classList.add('animate-bounce');
                setTimeout(() => quizFeedback.classList.remove('animate-bounce'), 800);
            }
        }

        // --- 7. Modal 控制 ---
        function openModal(modal, card) {
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                card.classList.remove('scale-90');
                card.classList.add('scale-100');
            }, 50);
        }

        function closeModal(modal, card) {
            modal.classList.add('opacity-0');
            card.classList.remove('scale-100');
            card.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // --- 8. 輸贏結算 ---

        function winGame() {
            endGame(true);
        }

        function loseGame() {
            endGame(false);
        }

        function endGame(isWin) {
            isGameOver = true;
            clearInterval(decayInterval);
            clearTimeout(demandTimeout);
            
            // 播放對應結局音效
            playSound(isWin ? 'win' : 'lose');

            if (isWin) {
                setPenguinExpression('kiss');
                speechBubble.innerText = "😘 親一個！最愛主人了！";
                
                endEmoji.innerText = "🏆";
                endTitle.innerText = "你救了小企鵝！";
                endTitle.className = "text-3xl font-black text-emerald-600 mb-2 pixel-font";
                endQuote.innerText = "「親一個！mua~~~ 😘」";
                
                // 漫天 Kiss 特效
                triggerKissRain();
            } else {
                setPenguinExpression('sad');
                speechBubble.innerText = "😭 我要換主人~~";
                
                endEmoji.innerText = "💔";
                endTitle.innerText = "企鵝離家出走了...";
                endTitle.className = "text-3xl font-black text-rose-600 mb-2 pixel-font";
                endQuote.innerText = "「我要換主人~~ 嗚嗚嗚 😭」";
            }

            // 開啟結算視窗
            setTimeout(() => {
                openModal(endModal, endCard);
            }, 1500);
        }

        // 噴出Kiss (emoji) 特效
        function triggerKissRain() {
            const emojis = ['😘', '💋', '❤️', '💖', '🥰'];
            const rainInterval = setInterval(() => {
                if (!isGameOver || mood < 100) {
                    clearInterval(rainInterval);
                    return;
                }
                
                const kiss = document.createElement('div');
                kiss.className = 'particle text-2xl';
                kiss.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                kiss.style.left = Math.random() * 100 + 'vw';
                kiss.style.fontSize = (Math.random() * 20 + 20) + 'px';
                kiss.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                document.body.appendChild(kiss);
                
                setTimeout(() => {
                    kiss.remove();
                }, 3500);
            }, 100);

            // 5秒後停止主動噴發（保留部分）
            setTimeout(() => {
                clearInterval(rainInterval);
            }, 5000);
        }
    </script>
</body>
